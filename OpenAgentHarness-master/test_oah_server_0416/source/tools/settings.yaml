test-echo:
  command: python3 ./.openharness/tools/servers/test-echo/test_echo_mcp.py
  enabled: true
  timeout: 30000
  expose:
    tool_prefix: test-echo

web-search-mcp:
  url: http://127.0.0.1:3001/mcp
  enabled: true
  timeout: 5000
  expose:
    tool_prefix: web-search-mcp

edu-research-tools:
  command: python3 ./.openharness/tools/servers/edu-research-tools/edu_research_mcp.py
  enabled: true
  timeout: 60000
